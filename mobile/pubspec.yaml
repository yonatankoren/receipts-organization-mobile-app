name: receipts_app
description: Personal receipt capture and organization app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI
  material_design_icons_flutter: ^7.0.7296
  intl: ^0.20.2
  
  # Camera
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  
  # Image compression (for sending to backend)
  flutter_image_compress: ^2.3.0
  
  # Local storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # State management
  provider: ^6.1.2
  
  # Google Auth + APIs
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2
  
  # Networking & connectivity
  connectivity_plus: ^6.1.0
  
  # Firebase (crash reporting)
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.2

  # Utils
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  collection: ^1.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

